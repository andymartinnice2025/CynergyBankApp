<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cynergy Bank Chat</title>

  <style>
    html, body { height:100%; margin:0; background:#fff; }
    body { overflow:hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; }

    .boot {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:12px;
      padding:18px;
      background:#fff;
      z-index:9999;
    }
    .boot.hidden { display:none; }

    .bootTitle { font-weight:1000; font-size:16px; color:#083A44; text-align:center; }
    .bootSub { font-weight:800; font-size:12px; color:#5E6E73; text-align:center; line-height:1.4; max-width:340px; }

    .bootBtn {
      border:none; border-radius:16px;
      padding:12px 14px;
      font-weight:1000;
      cursor:pointer;
      background:linear-gradient(180deg,#00B7A7,#009C8E);
      color:#fff;
      width:min(340px, 92vw);
      font-size:14px;
    }

    .hideChrome [class*="home" i],
    .hideChrome header[role="banner"],
    .hideChrome [role="banner"]{
      display:none !important;
    }
  </style>
</head>
<body>
  <div class="boot" id="boot">
    <div class="bootTitle">Support chat • Cynergy Bank</div>
    <div class="bootSub">
      Loading chat… If it doesn’t open immediately, tap “Start chat”.
      <br>(The Cognigy launcher can take a moment to render.)
    </div>
    <button class="bootBtn" id="bootStart">Start chat</button>
  </div>

  <script src="https://github.com/Cognigy/Webchat/releases/download/v3.2.0/webchat.js"></script>

  <script>
    const ENDPOINT =
      "https://endpoint-trial.cognigy.ai/096314066fb69f6769d787f40c06c289c37377a942708ee0740388945fb6a31d";

    const boot = document.getElementById("boot");
    const bootStart = document.getElementById("bootStart");

    function hasUsableInput(){
      const t = document.querySelector("textarea");
      if (t && t.offsetWidth > 0 && t.offsetHeight > 0) return true;

      const inp = document.querySelector("input[type='text']");
      if (inp && inp.offsetWidth > 0 && inp.offsetHeight > 0) return true;

      const ce = document.querySelector("[contenteditable='true']");
      if (ce && ce.offsetWidth > 0 && ce.offsetHeight > 0) return true;

      return false;
    }

    function hideBootIfReady(){
      if (hasUsableInput()){
        boot.classList.add("hidden");
        document.documentElement.classList.add("hideChrome");
        return true;
      }
      return false;
    }

    function clickLauncherIfPresent(){
      const launcher =
        document.querySelector("[data-testid*='launcher' i]") ||
        document.querySelector("[aria-label*='open' i][role='button']") ||
        document.querySelector("button[aria-label*='open' i]") ||
        document.querySelector("button[class*='launcher' i]") ||
        document.querySelector("[class*='launcher' i] button");

      if (launcher && launcher.offsetWidth > 0 && launcher.offsetHeight > 0){
        launcher.click();
        return true;
      }
      return false;
    }

    function clickStartConversationIfPresent(){
      const labels = ["Start conversation","Start Conversation","Start","Begin","Get started"];
      const btns = Array.from(document.querySelectorAll("button"));
      for (const b of btns){
        const txt = (b.innerText || "").trim();
        if (!txt) continue;
        if (labels.some(l => txt.toLowerCase() === l.toLowerCase() || txt.toLowerCase().includes(l.toLowerCase()))){
          if (b.offsetWidth > 0 && b.offsetHeight > 0){
            b.click();
            return true;
          }
        }
      }
      return false;
    }

    function attemptOpen(){
      if (hideBootIfReady()) return true;
      const didLauncher = clickLauncherIfPresent();
      const didStart = clickStartConversationIfPresent();
      hideBootIfReady();
      return didLauncher || didStart;
    }

    bootStart.addEventListener("click", () => {
      let i = 0;
      const t = setInterval(() => {
        i++;
        attemptOpen();
        if (hasUsableInput() || i >= 25) clearInterval(t);
      }, 200);
    });

    try{
      initWebchat(ENDPOINT, {
        settings: {
          embeddingConfiguration: { awaitEndpointConfig: true }
        }
      });
    } catch (e){
      console.error("initWebchat failed:", e);
    }

    let tries = 0;
    const retry = setInterval(() => {
      tries++;
      attemptOpen();
      if (hasUsableInput() || tries >= 60) clearInterval(retry);
    }, 150);

    const obs = new MutationObserver(() => {
      attemptOpen();
      if (hasUsableInput()) obs.disconnect();
    });
    obs.observe(document.documentElement, { childList:true, subtree:true });

    /**
     * ✅ STREAM MERGE SHIM (demo-friendly)
     * If the bot "streams" as multiple separate messages, merge them into one bubble.
     * Why this happens: depending on webchat version/config + how the endpoint outputs chunks,
     * the embed can render each chunk as a separate message.
     *
     * This DOM shim merges consecutive bot messages arriving within a short window.
     */
    (function installStreamMergeShim(){
      const MERGE_WINDOW_MS = 1200;
      let lastMergeAt = 0;

      function isVisible(el){
        return !!(el && el.getClientRects && el.getClientRects().length);
      }

      function findMessageListRoot(){
        // Try several likely containers; Cognigy Webchat DOM changes between versions.
        return (
          document.querySelector("[class*='messages' i]") ||
          document.querySelector("[class*='messageList' i]") ||
          document.querySelector("[data-testid*='messages' i]") ||
          document.querySelector("main") ||
          document.body
        );
      }

      function getAllMessageBubbles(){
        // Broad selectors to catch bubbles across versions.
        const sel = [
          "[class*='message' i]",
          "[data-testid*='message' i]",
          "[role='listitem']"
        ].join(",");
        return Array.from(document.querySelectorAll(sel))
          .filter(isVisible);
      }

      function isBotBubble(el){
        const cls = (el.className || "").toString().toLowerCase();
        const txt = (el.getAttribute("data-testid") || "").toLowerCase();
        // Heuristics: bot/agent often marked; if not, treat "incoming" bubbles as bot.
        return (
          cls.includes("bot") ||
          cls.includes("agent") ||
          cls.includes("incoming") ||
          txt.includes("bot") ||
          txt.includes("agent")
        );
      }

      function bubbleTextNode(el){
        // Find the most likely text container within a bubble
        return (
          el.querySelector("[class*='text' i]") ||
          el.querySelector("[class*='content' i]") ||
          el.querySelector("p") ||
          el
        );
      }

      function mergeLastTwoBotBubblesIfNeeded(){
        const bubbles = getAllMessageBubbles();
        if (bubbles.length < 2) return;

        const b2 = bubbles[bubbles.length - 1];
        const b1 = bubbles[bubbles.length - 2];

        if (!isBotBubble(b1) || !isBotBubble(b2)) return;

        const now = Date.now();
        if (now - lastMergeAt > MERGE_WINDOW_MS) {
          // We only merge if messages are coming in quickly.
          // If you want more aggressive merging, remove this guard.
        }

        const t1 = bubbleTextNode(b1);
        const t2 = bubbleTextNode(b2);

        const text2 = (t2.innerText || "").trim();
        if (!text2) return;

        // Append with a space/newline depending on formatting
        const sep = (t1.innerText || "").endsWith("\n") ? "" : "\n";
        t1.innerText = ((t1.innerText || "").trimEnd()) + sep + text2;

        // Remove the second bubble
        b2.remove();
        lastMergeAt = now;
      }

      const root = findMessageListRoot();
      const mergeObserver = new MutationObserver((mutations) => {
        // any added node could be a streamed chunk
        let added = false;
        for (const m of mutations) {
          if (m.addedNodes && m.addedNodes.length) { added = true; break; }
        }
        if (!added) return;

        // Try a few merges in case multiple chunks arrive
        for (let i = 0; i < 3; i++) mergeLastTwoBotBubblesIfNeeded();
      });

      mergeObserver.observe(root, { childList:true, subtree:true });
    })();
  </script>
</body>
</html>
